<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سَنَد - لوحة تحكم المشرفين</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <header class="app-header">
        <div class="logo-section">
            <h2>لوحة تحكم المحاسبة والمخزون</h2>
        </div>
        <a href="index.html" style="color: white; text-decoration: none; font-size: 14px;">⬅️ عودة</a>
    </header>

    <main style="padding: 20px;">
        <section class="stock-card" style="background: white; border: 1px solid #ddd; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.01);">
            <h3 style="color: #0d5c63; margin-bottom: 10px;">💧 مخزون محطة مياه النصر</h3>
            <p style="font-size: 14px; color: #666; margin-bottom: 15px;">السعة الإجمالية للخزان: 5,000 لتر</p>
            
            <div id="stock-display" style="font-size: 36px; font-weight: bold; color: #e65f2b; margin-bottom: 20px;">
                5000 لتر
            </div>

            <div class="control-buttons" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn btn-secondary" onclick="adjustStock(-500)" style="background: #fff; color: #721c24; border-color: #f5c6cb;">خصم 500 لتر 📉</button>
                <button class="btn btn-primary" onclick="adjustStock(500)" style="background: #28a745; color: white;">إضافة 500 لتر 📈</button>
            </div>
            
            <button class="btn btn-primary" onclick="generateShareCode()" style="width: 100%; background: #0d5c63;">توليد كود التحديث (QR Code) 🔄</button>
        </section>

        <section id="qr-section" style="margin-top: 35px; text-align: center; display: none; background: #fff; padding: 20px; border-radius: 12px; border: 1px dashed #0d5c63;">
            <h4 style="color: #333; margin-bottom: 10px;">مسح كود التحديث الافتراضي</h4>
            <p style="font-size: 12px; color: #666; margin-bottom: 15px;">يمكن للمواطنين توجيه كاميرا تطبيق سند ومسح هذا الكود لتحديث البيانات لديهم فوراً بدون إنترنت.</p>
            
            <div id="qrcode" style="display: inline-block; padding: 10px; background: white; border: 1px solid #ccc;"></div>
            
            <button class="btn btn-secondary" onclick="document.getElementById('qr-section').style.display='none'" style="margin-top: 15px; display: block; width: 100%; font-size: 12px; padding: 6px;">إغلاق الكود</button>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">🏠 الرئيسية</a>
        <a href="#" class="nav-item">📍 الخريطة</a>
        <a href="report.html" class="nav-item">⚠️ إبلاغ</a>
        <a href="admin.html" class="nav-item active">📊 الإدارة</a>
    </nav>

    <script src="admin.js"></script>
</body>
</html>
